# Strategy:
# Build the project's Docker image on a stock ubuntu-latest runner (cold build ~5min is acceptable),
# run the container by name to generate /home/opam/crane-blog/_site, then `docker cp` the whole
# _site tree onto the host (no bind mounts — Docker file sharing is unreliable). The `build` job
# uploads the tree as a Pages artifact; a dependent `deploy` job publishes it to GitHub Pages.

name: Deploy Verified Blog

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: docker buildx build --load -t crane-blog .

      - name: Generate site in container
        run: |
          docker run --name crane-blog-run crane-blog \
            sh -c 'eval $(opam env) && ./_build/default/src/blog_generator.exe ./posts'

      - name: Extract _site from container
        run: |
          docker cp crane-blog-run:/home/opam/crane-blog/_site ./_site
          docker rm crane-blog-run

      - name: Write CNAME for custom domain
        run: echo 'wklm.online' > _site/CNAME

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
